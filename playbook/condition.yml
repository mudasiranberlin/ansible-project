---
- name: Condition Playbook
  hosts: demo
  remote_user: ansible
  become: yes

  tasks:
    - name: Install Apache on Debian
      apt:
        name: apache2
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Apache on RedHat
      yum:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"
